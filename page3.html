<!DOCTYPE html>

<html>

<head>

    <title>Contact Me</title>

    <style>

        body {

            background: linear-gradient(to right, #4facfe, #00f2fe);

            font-family: Arial, sans-serif;

        }

        .container {

            width: 400px;

            margin: 80px auto;

            background: white;

            padding: 25px;

            border-radius: 15px;

            text-align: center;

        }

        h1 {

            color: #333;

        }

        input, textarea {

            width: 100%;

            padding: 10px;

            margin-top: 10px;

            border: 1px solid #ccc;

            border-radius: 5px;

        }

        button {

            width: 100%;

            padding: 10px;

            margin-top: 15px;

            background: #4facfe;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;

        }

        button:hover {

            background: #007bff;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>Contact Me</h1>

    <form>

        <input type="text" placeholder="Full Name">

        <input type="email" placeholder="Email Address">

        <textarea rows="5" placeholder="Type your message here"></textarea>

        <button type="submit">Send</button>

    </form>

</div>

      <a href="page.html">ABOUT ME</a>|&nbsp

    </div>


</body>

</html>
